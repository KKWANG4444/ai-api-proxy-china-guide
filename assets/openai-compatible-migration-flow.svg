<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI-compatible API migration test flow</title>
  <desc id="desc">A staged test flow from application configuration through models, chat, streaming, tools, observability, canary traffic and production.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#111827"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#203047" stroke-width="1" opacity=".45"/></pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6 0 12z" fill="#67e8f9"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity=".28"/></filter>
  </defs>
  <rect width="1200" height="630" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="630" rx="24" fill="url(#grid)"/>
  <text x="70" y="82" fill="#f8fafc" font-family="Arial, sans-serif" font-size="38" font-weight="700">OpenAI-compatible API migration</text>
  <text x="70" y="119" fill="#94a3b8" font-family="Arial, sans-serif" font-size="21">Test the protocol in layers before routing production traffic</text>
  <g fill="none" stroke="#67e8f9" stroke-width="4" marker-end="url(#arrow)">
    <path d="M230 245H316"/><path d="M520 245H606"/><path d="M810 245H896"/>
    <path d="M1010 305V384"/><path d="M910 455H824"/><path d="M620 455H534"/><path d="M330 455H244"/>
  </g>
  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <g><rect x="70" y="185" width="160" height="120" rx="14" fill="#0f2634" stroke="#22d3ee" stroke-width="2"/><text x="150" y="228" text-anchor="middle" fill="#e6fbff" font-size="20" font-weight="700">Configure</text><text x="150" y="260" text-anchor="middle" fill="#9bd8e5" font-size="15">base URL</text><text x="150" y="282" text-anchor="middle" fill="#9bd8e5" font-size="15">key + model ID</text></g>
    <g><rect x="320" y="185" width="200" height="120" rx="14" fill="#10291f" stroke="#34d399" stroke-width="2"/><text x="420" y="228" text-anchor="middle" fill="#e9fff5" font-size="20" font-weight="700">Discover</text><text x="420" y="260" text-anchor="middle" fill="#a7e8ce" font-size="15">GET /models</text><text x="420" y="282" text-anchor="middle" fill="#a7e8ce" font-size="15">auth + exact IDs</text></g>
    <g><rect x="610" y="185" width="200" height="120" rx="14" fill="#2d204c" stroke="#a78bfa" stroke-width="2"/><text x="710" y="228" text-anchor="middle" fill="#f5f0ff" font-size="20" font-weight="700">Chat</text><text x="710" y="260" text-anchor="middle" fill="#d3c6fa" font-size="15">small request</text><text x="710" y="282" text-anchor="middle" fill="#d3c6fa" font-size="15">retries disabled</text></g>
    <g><rect x="900" y="185" width="220" height="120" rx="14" fill="#3b240d" stroke="#fbbf24" stroke-width="2"/><text x="1010" y="228" text-anchor="middle" fill="#fff8e7" font-size="20" font-weight="700">Feature checks</text><text x="1010" y="260" text-anchor="middle" fill="#f8d98b" font-size="15">SSE streaming</text><text x="1010" y="282" text-anchor="middle" fill="#f8d98b" font-size="15">tools + Responses</text></g>
    <g><rect x="820" y="395" width="300" height="120" rx="14" fill="#351722" stroke="#fb7185" stroke-width="2"/><text x="970" y="438" text-anchor="middle" fill="#fff0f4" font-size="20" font-weight="700">Observe</text><text x="970" y="470" text-anchor="middle" fill="#f6b4c5" font-size="15">status, request ID, latency</text><text x="970" y="492" text-anchor="middle" fill="#f6b4c5" font-size="15">never log secrets</text></g>
    <g><rect x="530" y="395" width="290" height="120" rx="14" fill="#10291f" stroke="#34d399" stroke-width="2"/><text x="675" y="438" text-anchor="middle" fill="#e9fff5" font-size="20" font-weight="700">Canary</text><text x="675" y="470" text-anchor="middle" fill="#a7e8ce" font-size="15">small traffic percentage</text><text x="675" y="492" text-anchor="middle" fill="#a7e8ce" font-size="15">keep rollback available</text></g>
    <g><rect x="240" y="395" width="290" height="120" rx="14" fill="#0f2634" stroke="#22d3ee" stroke-width="2"/><text x="385" y="438" text-anchor="middle" fill="#e6fbff" font-size="20" font-weight="700">Compare</text><text x="385" y="470" text-anchor="middle" fill="#9bd8e5" font-size="15">errors, latency, usage</text><text x="385" y="492" text-anchor="middle" fill="#9bd8e5" font-size="15">old route vs new route</text></g>
    <g><rect x="70" y="395" width="170" height="120" rx="14" fill="#152238" stroke="#94a3b8" stroke-width="2"/><text x="155" y="438" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">Production</text><text x="155" y="470" text-anchor="middle" fill="#cbd5e1" font-size="15">bounded retries</text><text x="155" y="492" text-anchor="middle" fill="#cbd5e1" font-size="15">tested rollback</text></g>
  </g>
  <text x="70" y="578" fill="#64748b" font-family="Arial, sans-serif" font-size="16">A first successful prompt is a smoke test, not a migration acceptance test.</text>
</svg>